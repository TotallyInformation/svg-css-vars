<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen</title>
</head>

<body>
    <div id="world-img" style="--uib-world-fill: green;">
        <p>This is blue by default, set to green using CSS variables.</p>
        <img src="./blue-world.svg" alt="Blue World Image" style="width:30%;">
    </div>
    <div id="star-no-var-img"  style="fill: red !important;">
        <p>This is a star without CSS variables.</p>
        <img src="./star-novar.svg" alt="Star No Var Image">
    </div>
    <div id="star-var-img" style="--star-fill: purple;">
        <p>This is a star with CSS variables.</p>
        <img src="./star-var.svg" alt="Star Var Image">
    </div>

    <!-- <script src="./script.js"></script> -->
</body>

</html>
